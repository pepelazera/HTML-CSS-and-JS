<!DOCTYPE html>

<html>
    <head> 
        <title>My first website </title> <!-- Quando abrimos no navegador, o title aparece bem na aba do proprio, como realmente um titulo para a aba, como ja diz o nome, title -->
    </head> <!-- Aqui eh onde ficam as informacoes que nao sao mostradas diretamente na tela no navegador, eh o meu cabecalho. Aqui ficarao todas as informacoes de fundo importantes, mas nao para visualizacao -->


    <body>
                                            <!-- O h1 vai servir pra dizer que esse eh meu cabecalho, entao vai deixar ele como um titulo e o que vier depois vem como uma frase padrao ou um subtitulo-->
        <h1> This is my first ever website! </h1> <!-- O "p" em HTML significa paragrafo, e nos colocamos somente a letra "p", pois por ele ser muito utilizado nos codigos, fica mais pratico -->
                                            <!-- Voce so pode ter 1 h1 por pagina -->
        <p> Hello there, how are you ?  </p> 
        
        <h2>
            <p></p>
        </h2>

        <h2>HTML</h2>
        <p>HMTL is the building blocks of webpages</p>


        <h2>CSS</h2>
        <p>CSS is what makes websites look cool</p>
    </body> <!-- O body eh o responsavel por exibir o conteudo na pagina para o usuario -->

</html>
