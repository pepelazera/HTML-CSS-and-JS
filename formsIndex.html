<!DOCTYPE html>
<html>
    <title>Forms Index Test</title>

    <body>
        <h1>
            Test of forms
        </h1>
    </body>

    <form action="https://www.youtube.com/", method="post">
        <div>
            <label>Firts name</label>
            <input type="text", name="First name", placeholder="Enter your first name: ">
        </div>

        <br>

        <div>
            <label>Last name</label>
            <input type="text", name="Last Name", placeholder="Enter your last name">
        </div>

        <br>

        <div>
            <label>Message</label>
            <textarea name="message" placeholder="Enter the message"></textarea>
        </div>

        <br>

        <div>
            <label>Gender</label>
            <select name="gender">
                <option value="male'">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <br>

        <div>   
            <button>
                <label>Button</label>
            </button>
        </div>
    </form>

</html>
